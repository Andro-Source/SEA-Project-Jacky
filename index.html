<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UCSD CSE Course Catalog</title>
    <meta
      name="description"
      content="A simple catalog of UC San Diego Computer Science and Engineering courses."
    />
    <link rel="stylesheet" href="style.css" />
    <script src="scripts.js" defer></script>
  </head>
  <body>
    <header class="page-header">
      <div class="container">
        <h1>UCSD CSE Course Catalog</h1>
        <p>
          Browse Computer Science and Engineering courses from UC San Diego.
        </p>
      </div>
    </header>

    <main class="container">
      <section class="controls">
        <div class="control-group">
          <label for="search-input">Search courses</label>
          <input
            id="search-input"
            type="text"
            placeholder="Search by code or title"
          />
        </div>

        <div class="control-group">
          <label for="sort-select">Sort by course number</label>
          <select id="sort-select">
            <option value="asc">Ascending</option>
            <option value="desc">Descending</option>
          </select>
        </div>
      </section>

      <section>
        <div id="results-count" class="results-count"></div>
        <div id="course-list" class="course-list"></div>
      </section>
    </main>
  </body>
</html>
